name: Poliport Lojistik — Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Web sitesi (GitHub Pages) — her zaman çalışır ─────
  deploy-web:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./app
          publish_branch: gh-pages
          force_orphan: true

  # ── Windows .exe ───────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci --ignore-scripts || npm install
      - run: npx electron-builder --win portable --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: Poliport-Lojistik-Windows-exe
          path: dist/*.exe
          if-no-files-found: warn

  # ── macOS .dmg ─────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci --ignore-scripts || npm install
      - run: npx electron-builder --mac dmg --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: Poliport-Lojistik-Mac-dmg
          path: dist/*.dmg
          if-no-files-found: warn
